<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bird Photography Catalog Website</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#0b1412;--bark:#1a2820;--moss:#2b4a35;--fern:#4a7c59;--sage:#8aba94;--paper:#eee8d5;--gold:#c9a84c}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Crimson Pro',Georgia,serif;background:var(--ink);color:var(--paper);-webkit-text-size-adjust:100%}

/* LOGIN */
#gate{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;background:var(--ink);padding:1rem}
#gate::before{content:'';position:absolute;inset:0;background-image:radial-gradient(ellipse 120% 80% at 10% 80%,rgba(43,74,53,.65) 0%,transparent 55%),radial-gradient(ellipse 70% 90% at 90% 10%,rgba(26,40,32,.8) 0%,transparent 60%);pointer-events:none}
.g-card{position:relative;display:flex;width:min(760px,100%);border:1px solid rgba(138,186,148,.18);border-radius:2px;overflow:hidden;box-shadow:0 48px 140px rgba(0,0,0,.85);animation:cardIn .9s cubic-bezier(.16,1,.3,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.g-art{width:200px;flex-shrink:0;background:var(--moss);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;padding:2.5rem 1.4rem;border-right:1px solid rgba(138,186,148,.15);position:relative;overflow:hidden}
.g-art::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,rgba(201,168,76,.14),transparent 65%)}
.g-bird{font-size:4rem;line-height:1;filter:drop-shadow(0 0 18px rgba(201,168,76,.5));position:relative;z-index:1}
.g-rule{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(138,186,148,.45),transparent);position:relative;z-index:1}
.g-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.22em;color:var(--sage);opacity:.75;text-transform:uppercase;position:relative;z-index:1;text-align:center}
.g-form{flex:1;background:var(--bark);padding:2.5rem 2.2rem;display:flex;flex-direction:column;justify-content:center}
.g-form h1{font-family:'Cinzel',serif;font-size:clamp(1.1rem,4vw,1.45rem);font-weight:600;line-height:1.25;color:var(--paper);margin-bottom:.3rem;letter-spacing:.04em}
.g-form .sub{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);opacity:.65;margin-bottom:1.8rem}
.g-lbl{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);opacity:.75;margin-bottom:.45rem}
.g-pwd{position:relative;margin-bottom:.9rem}
.g-pwd input{width:100%;padding:.78rem 2.6rem .78rem .95rem;background:rgba(255,255,255,.04);border:1px solid rgba(138,186,148,.22);border-radius:2px;color:var(--paper);font-family:'Crimson Pro',serif;font-size:max(16px,1rem);letter-spacing:.06em;outline:none;transition:border-color .25s,box-shadow .25s}
.g-pwd input:focus{border-color:rgba(201,168,76,.5);box-shadow:0 0 0 3px rgba(201,168,76,.07)}
.g-pwd input::placeholder{color:rgba(238,232,213,.22)}
.g-eye{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(138,186,148,.45);font-size:.9rem;min-width:2.5rem;min-height:2.5rem;display:flex;align-items:center;justify-content:center}
.g-eye:hover{color:var(--sage)}
.g-btn{width:100%;padding:.82rem;background:var(--fern);border:1px solid var(--sage);border-radius:2px;color:var(--paper);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:background .25s,box-shadow .25s;min-height:44px}
.g-btn:hover{background:var(--sage);color:var(--ink);box-shadow:0 0 28px rgba(138,186,148,.28)}
.g-btn:active{transform:scale(.99)}
.g-err{margin-top:.75rem;font-size:.72rem;color:#e08070;min-height:1em;opacity:0;transition:opacity .3s;text-align:center}
.g-err.on{opacity:1}
@media(max-width:520px){#gate{padding:.75rem;align-items:flex-start;padding-top:10vh}.g-card{flex-direction:column}.g-art{display:none}.g-form{padding:2rem 1.5rem}}

/* APP */
#app{display:none;height:100%;height:100dvh;flex-direction:column}
#app.on{display:flex}
#bar{flex-shrink:0;height:50px;display:flex;align-items:center;gap:.85rem;padding:0 1.3rem;background:rgba(11,20,18,.96);border-bottom:1px solid rgba(74,124,89,.25);box-shadow:0 2px 22px rgba(0,0,0,.55);z-index:700;position:relative}
#bar .b-icon{font-size:1.4rem;line-height:1;flex-shrink:0}
#bar h1{font-family:'Cinzel',serif;font-size:clamp(.65rem,1.5vw + .3rem,.92rem);font-weight:600;color:var(--paper);letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#bar .b-sep{width:1px;height:18px;background:rgba(138,186,148,.2);flex-shrink:0}
#bar .b-note{font-size:.67rem;color:rgba(138,186,148,.45);letter-spacing:.06em;white-space:nowrap}
#bar .b-pill{margin-left:auto;flex-shrink:0;font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;color:var(--sage);background:rgba(74,124,89,.2);border:1px solid rgba(138,186,148,.2);padding:.22rem .65rem;border-radius:20px}
@media(max-width:480px){#bar{padding:0 .9rem;gap:.55rem}#bar .b-sep,#bar .b-note{display:none}#bar h1{font-size:.75rem}}

/* MAP */
#map{flex:1;min-height:0}
.leaflet-container{background:#080f0d;height:100%!important}

/* POPUP */
.leaflet-popup-content-wrapper{background:rgba(11,20,18,.97)!important;border:1px solid rgba(74,124,89,.45)!important;border-radius:3px!important;padding:0!important;overflow:hidden;box-shadow:0 20px 70px rgba(0,0,0,.8)!important;max-width:calc(100vw - 2rem)!important}
.leaflet-popup-tip{background:rgba(11,20,18,.97)!important}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-close-button{color:var(--sage)!important;font-size:1.1rem!important;padding:7px 10px!important;z-index:5;min-width:36px;min-height:36px;display:flex!important;align-items:center;justify-content:center}
.leaflet-popup-close-button:hover{color:var(--gold)!important}

/* POPUP CARD */
.pop{width:300px;max-width:calc(100vw - 3rem)}

/* CAROUSEL */
.carousel{position:relative;width:100%;height:clamp(160px,40vw,200px);overflow:hidden;background:var(--ink);user-select:none}
.car-track{display:flex;height:100%;transition:transform .32s ease}
.car-slide{flex:0 0 100%;height:100%;position:relative}
.car-slide img{width:100%;height:100%;object-fit:cover;display:block}
.car-slide .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;opacity:.15;font-size:3rem}
.car-btn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;background:rgba(11,20,18,.75);border:1px solid rgba(138,186,148,.3);border-radius:50%;color:var(--sage);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;backdrop-filter:blur(4px);transition:background .2s;padding:0;line-height:1}
.car-btn:hover{background:rgba(43,74,53,.9)}
.car-prev{left:8px}.car-next{right:8px}
.car-btn.hidden{display:none}
.car-counter{position:absolute;bottom:8px;right:8px;background:rgba(11,20,18,.78);border:1px solid rgba(138,186,148,.2);border-radius:20px;padding:.12rem .48rem;font-size:.6rem;color:var(--sage);letter-spacing:.06em;backdrop-filter:blur(4px)}
.car-loc{position:absolute;bottom:8px;left:8px;background:rgba(11,20,18,.82);border:1px solid rgba(201,168,76,.35);border-radius:2px;padding:.16rem .48rem;font-size:.58rem;letter-spacing:.06em;color:var(--gold);backdrop-filter:blur(4px);max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* POPUP BODY */
.pop-body{padding:.85rem 1rem 1rem}
.pop-bird{display:flex;align-items:center;gap:.45rem;background:rgba(43,74,53,.4);border:1px solid rgba(138,186,148,.25);border-radius:2px;padding:.35rem .6rem;margin-bottom:.55rem}
.pop-bird .b-icon{font-size:1rem;flex-shrink:0}
.pop-bird .b-info{min-width:0}
.pop-bird .b-common{font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;color:var(--paper);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pop-bird .b-sci{font-style:italic;font-size:.62rem;color:var(--sage);opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pop-bird .b-conf{margin-left:auto;flex-shrink:0;font-size:.6rem;color:var(--gold);letter-spacing:.06em}



/* TAGS + DATE */
.pop-tags{display:flex;flex-wrap:wrap;gap:.28rem;margin-bottom:.5rem}
.pop-tag{font-size:.58rem;font-family:'Cinzel',serif;letter-spacing:.1em;text-transform:uppercase;padding:.14rem .44rem;border-radius:20px;border:1px solid rgba(138,186,148,.28);color:var(--sage);background:rgba(74,124,89,.18)}
.pop-date{font-size:.68rem;color:rgba(238,232,213,.38);letter-spacing:.04em}
.pop-date em{color:var(--gold);font-style:normal}
.pop-count{font-size:.67rem;color:rgba(238,232,213,.32);margin-top:.28rem}
.pop-count em{color:var(--gold);font-style:normal}

/* MARKER */
.pin{width:34px;height:34px;background:var(--fern);border:2.5px solid var(--gold);border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 5px 18px rgba(0,0,0,.6),0 0 0 3px rgba(201,168,76,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:box-shadow .2s;touch-action:manipulation}
.pin:hover{box-shadow:0 6px 24px rgba(0,0,0,.75),0 0 0 5px rgba(201,168,76,.22)}
.pin-i{transform:rotate(45deg);font-size:14px;line-height:1;margin-top:1px}
@media(max-width:768px){.leaflet-control-zoom a{width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important}.leaflet-popup-close-button{font-size:1.3rem!important;padding:10px 12px!important}}
</style>
</head>
<body>

<div id="gate">
  <div class="g-card">
    <div class="g-art">
      <div class="g-bird">🦅</div>
      <div class="g-rule"></div>
      <div class="g-label">Private<br>Archive</div>
      <div class="g-rule"></div>
    </div>
    <div class="g-form">
      <h1>Bird Photography<br>Catalog Website</h1>
      <p class="sub">Field Collection · Restricted Access</p>
      <div class="g-lbl">Password</div>
      <div class="g-pwd">
        <input id="pwd" type="password" placeholder="Enter password" autocomplete="current-password">
        <button class="g-eye" onclick="toggleEye()" tabindex="-1">👁</button>
      </div>
      <button class="g-btn" onclick="login()">Enter Catalog</button>
      <div class="g-err" id="err">Incorrect password — please try again.</div>
    </div>
  </div>
</div>

<div id="app">
  <div id="bar">
    <span class="b-icon">🦜</span>
    <h1>Bird Photography Catalog Website</h1>
    <div class="b-sep"></div>
    <span class="b-note" id="b-note"></span>
    <span class="b-pill" id="b-pill"></span>
  </div>
  <div id="map"></div>
</div>

function login() {
  if (document.getElementById('pwd').value === 'birdlover') {
    const g = document.getElementById('gate');
    g.style.transition = 'opacity .5s ease'; g.style.opacity = '0';
    setTimeout(() => { g.style.display='none'; document.getElementById('app').classList.add('on'); initMap(); }, 520);
  } else {
    const e = document.getElementById('err'), p = document.getElementById('pwd');
    e.classList.add('on'); p.value=''; p.focus();
    p.style.borderColor='rgba(224,110,90,.55)';
    setTimeout(() => { e.classList.remove('on'); p.style.borderColor=''; }, 2800);
  }
}
function toggleEye() { const p=document.getElementById('pwd'); p.type=p.type==='password'?'text':'password'; }
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('pwd').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
});

// ── CAROUSEL STATE ────────────────────────────────────────────────
const carState = {};
function carMove(id, dir) {
  const wrap  = document.getElementById(id);
  if (!wrap) return;
  const track  = wrap.querySelector('.car-track');
  const slides = track.querySelectorAll('.car-slide');
  const n      = slides.length;
  if (n <= 1) return;
  if (!carState[id]) carState[id] = 0;
  carState[id] = (carState[id] + dir + n) % n;
  track.style.transform = `translateX(-${carState[id]*100}%)`;
  const ctr = wrap.querySelector('.car-counter');
  if (ctr) ctr.textContent = `${carState[id]+1} / ${n}`;
}

// ── MAP ───────────────────────────────────────────────────────────
function initMap() {
  const map = L.map('map',{center:[20,78],zoom:5,tap:true,tapTolerance:15});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);
  if (window.innerWidth<=768) map.zoomControl.setPosition('bottomright');

  const bounds=[]; let totalPhotos=0;

  GROUPS.forEach(g => {
    bounds.push([g.lat,g.lon]);
    totalPhotos += g.photos.length;
    const n = g.photos.length;
    const carId = `car-${Math.random().toString(36).slice(2)}`;

    // Carousel slides
    const slides = g.photos.map(p => `
      <div class="car-slide">
        <img src="${p.url}" alt="${p.filename||''}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="no-img" style="display:none">🐦</div>
      </div>`).join('');

    // Facts bullets


    // Tags
    const tags = (g.keywords||[]).map(k=>`<span class="pop-tag">${k}</span>`).join('');

    // Date — use first photo's date
    const firstDate = g.photos.find(p=>p.date)?.date||'';
    const dateLine  = firstDate ? `<div class="pop-date">📅 Photographed <em>${firstDate}</em></div>` : '';
    const countLine = n>1 ? `<div class="pop-count"><em>${n}</em> photos at this location</div>` : '';

    const popup = `
      <div class="pop">
        <div class="carousel" id="${carId}">
          <div class="car-track">${slides}</div>
          <button class="car-btn car-prev${n<=1?' hidden':''}" onclick="carMove('${carId}',-1)">&#8249;</button>
          <button class="car-btn car-next${n<=1?' hidden':''}" onclick="carMove('${carId}',1)">&#8250;</button>
          ${n>1?`<div class="car-counter">1 / ${n}</div>`:''}
          <div class="car-loc">📍 ${g.location}</div>
        </div>
        <div class="pop-body">
          <div class="pop-bird">
            <span class="b-icon">🦜</span>
            <div class="b-info">
              <div class="b-common">${g.commonName}</div>
              ${g.sciName?`<div class="b-sci">${g.sciName}</div>`:''}
            </div>
            ${g.score?`<div class="b-conf">${g.score}%</div>`:''}
          </div>

          <div class="pop-tags">${tags}</div>
          ${dateLine}${countLine}
        </div>
      </div>`;

    const icon = L.divIcon({
      className:'',
      html:'<div class="pin"><div class="pin-i">🐦</div></div>',
      iconSize:[34,34],iconAnchor:[17,34],popupAnchor:[0,-38]
    });

    L.marker([g.lat,g.lon],{icon}).addTo(map)
      .bindPopup(popup,{
        maxWidth:Math.min(320,window.innerWidth-32),
        minWidth:Math.min(300,window.innerWidth-32),
      });
  });

  if (bounds.length===1) map.setView(bounds[0],11);
  else if (bounds.length>1) map.fitBounds(L.latLngBounds(bounds),{padding:[80,80]});

  document.getElementById('b-pill').textContent=`${totalPhotos} Photo${totalPhotos!==1?'s':''}`;
  document.getElementById('b-note').textContent=`${GROUPS.length} species pinned`;
  setTimeout(()=>map.invalidateSize(),100);
}
</script>
</body>
</html>
